<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="《悬观谜案：百年轮回》- 基于网页的交互式文字冒险游戏">
  <title>悬观谜案：百年轮回</title>
  
  <!-- 中文字体 -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
  
  <!-- 强制禁用缓存 -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  
  <link rel="stylesheet" href="./src/assets/styles/main.css?v=2">
  <link rel="stylesheet" href="./src/assets/styles/interaction-modal.css?v=2">
  <link rel="stylesheet" href="./src/assets/styles/quest-panel.css?v=2">
  <link rel="stylesheet" href="./src/assets/styles/dialogue-modal.css?v=2">
  <link rel="stylesheet" href="./src/assets/styles/inventory-modal.css?v=2">
  <link rel="stylesheet" href="./src/assets/styles/decision-modal.css?v=1">
  <link rel="stylesheet" href="./src/assets/styles/item-selector.css?v=1">
  <link rel="stylesheet" href="./src/assets/styles/start-screen.css?v=1">
  <link rel="stylesheet" href="./src/assets/styles/confirm-modal.css?v=1">
</head>
<body>
  <!-- 背景效果层 -->
  <div class="background-layer">
    <div class="ink-wash-bg"></div>
    <div class="grain-overlay"></div>
    <div class="vignette"></div>
  </div>

  <!-- 启动界面 -->
  <div id="start-screen" class="start-screen">
    <!-- 烟雾层 -->
    <div class="smoke-layer smoke-layer-bottom"></div>
    <div class="smoke-layer smoke-layer-middle"></div>
    <div class="smoke-layer smoke-layer-top"></div>

    <!-- 内容 -->
    <div class="start-content">
      <h1 class="start-title">
        <span class="title-main">悬观谜案</span>
        <span class="title-sub">百年轮回</span>
      </h1>

      <p class="start-subtitle">文字交互式推理解密游戏</p>

      <div class="start-buttons">
        <button id="btn-new-game" class="start-btn start-btn-primary">
          开始新的旅程
        </button>
        <button id="btn-continue" class="start-btn start-btn-secondary">
          继续探索
        </button>
        <button id="btn-settings" class="start-btn start-btn-tertiary">
          游戏设置
        </button>
        <button id="btn-credits" class="start-btn start-btn-tertiary">
          制作团队
        </button>
      </div>

      <div class="start-credits">
        <p>一款基于文本的交互式推理解密游戏</p>
      </div>
    </div>
  </div>

  <!-- 故事背景过渡界面 -->
  <div id="intro-screen" class="intro-screen hidden">
    <!-- 烟雾层 -->
    <div class="smoke-layer smoke-layer-bottom"></div>
    <div class="smoke-layer smoke-layer-middle"></div>
    <div class="smoke-layer smoke-layer-top"></div>

    <!-- 内容 -->
    <div class="intro-content">
      <div class="intro-title">
        <span class="title-main">悬观谜案</span>
        <span class="title-sub">百年轮回</span>
      </div>

      <div class="intro-story">
        <p class="intro-line">2025年1月</p>
        <p class="intro-line">林墨与苏晓雨应陈青山之邀</p>
        <p class="intro-line">前往西南山区的悬云观...</p>
        <p class="intro-line intro-blank">&nbsp;</p>
        <p class="intro-line">暴雪即将来袭，山路崎岖</p>
        <p class="intro-line">那座道观中隐藏着</p>
        <p class="intro-line">不为人知的秘密</p>
      </div>

      <button id="btn-intro-continue" class="intro-continue-btn">
        点击继续 →
      </button>
    </div>
  </div>

  <!-- 游戏主容器 -->
  <div id="game-container" class="game-container" style="display: none;">
    <!-- 标题栏 -->
    <header class="game-header">
      <div class="header-border">
        <h1 class="game-title">悬观谜案<span class="game-subtitle">百年轮回</span></h1>
      </div>
    </header>

    <!-- 用户信息面板 -->
    <aside class="user-info-panel">
      <div class="user-info-border">
        <!-- 第一行：用户基本信息 + 状态 -->
        <div class="user-status-row">
          <div class="user-basic">
            <span class="user-name">林墨</span>
            <span class="user-location">
              <span class="location-icon">📍</span>
              <span id="current-location">载入中...</span>
            </span>
          </div>
          <div class="status-display">
            <div class="status-item" data-status="stamina" title="体力">
              <span class="status-icon">⚡</span>
              <span class="status-value" id="stamina-value">100/100</span>
            </div>
            <div class="status-item" data-status="sanity" title="理智">
              <span class="status-icon">🧠</span>
              <span class="status-value" id="sanity-value">100/100</span>
            </div>
            <div class="status-item" data-status="temperature" title="体温">
              <span class="status-icon">🌡️</span>
              <span class="status-value" id="temperature-value">37.0°C</span>
            </div>
          </div>
        </div>

        <!-- 第二行：环境信息（平铺） -->
        <div class="environment-row">
          <div class="env-item" id="env-date">
            <span class="env-icon">📅</span>
            <span class="env-value">2025年1月15日</span>
          </div>
          <div class="env-item" id="env-time">
            <span class="env-icon">🕐</span>
            <span class="env-value">黄昏</span>
          </div>
          <div class="env-item" id="env-weather">
            <span class="env-icon">🌨️</span>
            <span class="env-value">暴雪</span>
          </div>
          <div class="env-item" id="env-temp">
            <span class="env-icon">🌡️</span>
            <span class="env-value">-5°C</span>
          </div>
        </div>
      </div>
    </aside>

    <!-- 场景描述区域 -->
    <main class="scene-display">
      <div class="scene-description-container">
        <div id="scene-description" class="scene-description">
          正在进入悬云观...
        </div>
      </div>
    </main>

    <!-- 交互反馈区域 -->
    <section class="feedback-area">
      <div id="feedback-log" class="feedback-log"></div>
    </section>

    <!-- 快捷按钮栏 -->
    <nav class="action-bar">
      <button class="action-btn" data-action="inventory" aria-label="道具">
        <span class="btn-icon">🎒</span>
        <span class="btn-text">道具</span>
      </button>
      <button class="action-btn" data-action="quest" aria-label="任务">
        <span class="btn-icon">📜</span>
        <span class="btn-text">任务</span>
      </button>
      <button class="action-btn" data-action="notes" aria-label="笔记">
        <span class="btn-icon">📓</span>
        <span class="btn-text">笔记</span>
      </button>
      <button class="action-btn" data-action="map" aria-label="地图">
        <span class="btn-icon">🗺️</span>
        <span class="btn-text">地图</span>
      </button>
      <button class="action-btn" data-action="save" aria-label="保存">
        <span class="btn-icon">💾</span>
        <span class="btn-text">保存</span>
      </button>
      <button class="action-btn" data-action="newgame" aria-label="新游戏">
        <span class="btn-icon">🔄</span>
        <span class="btn-text">新游戏</span>
      </button>
    </nav>

    <!-- 模态框容器 -->
    <div id="modal-container" class="modal-container hidden">
      <!-- 动态插入模态框内容 -->
    </div>
  </div>

  <!-- 加载遮罩 -->
  <div id="loading-overlay" class="loading-overlay">
    <div class="loading-content">
      <div class="loading-spinner"></div>
      <p class="loading-text">正在载入...</p>
      <p style="font-size: 0.75rem; color: var(--color-bone-white-dark); margin-top: 15px;">
        如果游戏无法正常运行，请按 Ctrl+F5 强制刷新
      </p>
    </div>
  </div>

  <!-- 脚本 -->
  <script type="module" src="./src/main.js?v=2"></script>
</body>
</html>
