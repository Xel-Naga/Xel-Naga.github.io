<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="《悬观谜案：百年轮回》- 基于网页的交互式文字冒险游戏">
  <title>悬观谜案：百年轮回</title>
  
  <!-- 中文字体 -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="./src/assets/styles/main.css">
  <link rel="stylesheet" href="./src/assets/styles/interaction-modal.css">
  <link rel="stylesheet" href="./src/assets/styles/quest-panel.css">
  <link rel="stylesheet" href="./src/assets/styles/dialogue-modal.css">
</head>
<body>
  <!-- 背景效果层 -->
  <div class="background-layer">
    <div class="ink-wash-bg"></div>
    <div class="grain-overlay"></div>
    <div class="vignette"></div>
  </div>

  <!-- 游戏主容器 -->
  <div id="game-container" class="game-container">
    <!-- 标题栏 -->
    <header class="game-header">
      <div class="header-border">
        <h1 class="game-title">悬观谜案</h1>
        <span class="game-subtitle">百年轮回</span>
      </div>
    </header>

    <!-- 场景显示区域 -->
    <main class="scene-display">
      <!-- 场景图片/背景 -->
      <div class="scene-visual">
        <div class="scene-location-tag">
          <span id="current-location">载入中...</span>
        </div>
      </div>
      
      <!-- 场景描述文本 -->
      <div class="scene-description-container">
        <div id="scene-description" class="scene-description">
          正在进入悬云观...
        </div>
      </div>
    </main>

    <!-- 交互反馈区域 -->
    <section class="feedback-area">
      <div id="feedback-log" class="feedback-log"></div>
    </section>

    <!-- 玩家状态面板 -->
    <aside class="status-panel">
      <div class="status-border">
        <div class="status-header">
          <span class="status-title">状态</span>
          <button id="status-toggle" class="toggle-btn" aria-label="切换状态面板">▼</button>
        </div>
        <div id="status-content" class="status-content">
          <div class="status-item" data-status="stamina">
            <span class="status-label">体力</span>
            <div class="status-bar">
              <div class="status-fill" id="stamina-fill"></div>
            </div>
            <span class="status-value" id="stamina-value">100</span>
          </div>
          <div class="status-item" data-status="sanity">
            <span class="status-label">理智</span>
            <div class="status-bar">
              <div class="status-fill" id="sanity-fill"></div>
            </div>
            <span class="status-value" id="sanity-value">100</span>
          </div>
          <div class="status-item" data-status="temperature">
            <span class="status-label">体温</span>
            <div class="status-bar">
              <div class="status-fill" id="temperature-fill"></div>
            </div>
            <span class="status-value" id="temperature-value">37°C</span>
          </div>
        </div>
      </div>
    </aside>

    <!-- 快捷按钮栏 -->
    <nav class="action-bar">
      <button class="action-btn" data-action="inventory" aria-label="道具">
        <span class="btn-icon">🎒</span>
        <span class="btn-text">道具</span>
      </button>
      <button class="action-btn" data-action="quest" aria-label="任务">
        <span class="btn-icon">📜</span>
        <span class="btn-text">任务</span>
      </button>
      <button class="action-btn" data-action="notes" aria-label="笔记">
        <span class="btn-icon">📓</span>
        <span class="btn-text">笔记</span>
      </button>
      <button class="action-btn" data-action="map" aria-label="地图">
        <span class="btn-icon">🗺️</span>
        <span class="btn-text">地图</span>
      </button>
      <button class="action-btn" data-action="save" aria-label="保存">
        <span class="btn-icon">💾</span>
        <span class="btn-text">保存</span>
      </button>
    </nav>

    <!-- 模态框容器 -->
    <div id="modal-container" class="modal-container hidden">
      <!-- 动态插入模态框内容 -->
    </div>
  </div>

  <!-- 加载遮罩 -->
  <div id="loading-overlay" class="loading-overlay">
    <div class="loading-content">
      <div class="loading-spinner"></div>
      <p class="loading-text">正在载入...</p>
    </div>
  </div>

  <!-- 脚本 -->
  <script type="module" src="./src/main.js"></script>
</body>
</html>
